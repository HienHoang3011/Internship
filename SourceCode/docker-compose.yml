version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: psychology
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:6-jammy
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=psychology
      - DB_USER=root
      - DB_PASSWORD=password
      - MONGO_URI=mongodb://mongo:27017/psychology
      - AGENT_API_URL=http://agent:8001/chat
    ports:
      - "8000:8000"
    depends_on:
      - db
      - mongo
      - agent
    command: >
      sh -c "uv run python manage.py migrate &&
             uv run gunicorn --bind 0.0.0.0:8000 app.config.wsgi:application"

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      - db
      - mongo
    command: >
      sh -c "uv run python -m app.agents.api"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data:
