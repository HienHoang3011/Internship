version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: psychology
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:6-jammy
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=psychology
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=password
      - MONGODB_URL=mongodb://mongo:27017/
      - MONGODB_DATABASE=psychology
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - AGENT_API_URL=http://agent:8001/chat
    ports:
      - "8000:8000"
    depends_on:
      - db
      - mongo
      - agent
    command: >
      sh -c "uv run python manage.py migrate &&
             uv run python scripts/seed_db.py &&
             uv run gunicorn --bind 0.0.0.0:8000 app.config.wsgi:application"

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=psychology
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=password
      - MONGODB_URL=mongodb://mongo:27017/
      - MONGODB_DATABASE=psychology
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    ports:
      - "8001:8001"
    depends_on:
      - db
      - mongo
    command: >
      sh -c "uv run python -m app.agents.api"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data:
